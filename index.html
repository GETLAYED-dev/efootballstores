<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GETLAYED/DEV | EFootball Account Store</title>
  <style>
    :root {
      --primary-gold: #FFD700;
      --bg-dark: #0d0d0d;
      --card-bg: #1a1a1a;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg-dark);
      color: #fff;
      text-align: center;
    }

    header {
      padding: 40px 20px;
      background: #111;
      border-bottom: 3px solid var(--primary-gold);
    }

    .header-img {
      max-width: 120px;
      border-radius: 50%;
      border: 2px solid var(--primary-gold);
      margin-bottom: 15px;
    }

    .container {
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 25px;
      border: 1px solid #333;
    }

    /* Professional Image Grid */
    .account-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin: 20px 0;
    }

    .account-gallery img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 8px;
    }

    .btn {
      display: inline-block;
      padding: 15px 35px;
      background: var(--primary-gold);
      color: #000;
      text-decoration: none;
      border-radius: 50px;
      font-weight: bold;
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #fff;
    }

    footer {
      padding: 30px;
      background: #111;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <header>
    <img class="header-img" src="images/header.jpeg" alt="Logo">
    <h1>⚽ EFootball Account Store</h1>
    <p>Buy & Sell Verified High-Tier Accounts</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>🔥 Latest Stock</h2>
      <div class="account-gallery">
        <img src="images/accounts2.jpeg" alt="Account 1">
        
        <img src="images/account3.jpeg" alt="Account 2">
        <img src="images/accounts4.jpeg" alt="Account 3">
      </div>
      <p>Instant Delivery | 100% Secure | Trusted by Players</p>
    </div>

    <div class="card">
      <h2>Ready to Buy?</h2>
      <p>Click below to message me directly and choose your account.</p>
      
      <a class="btn" href="https://wa.me/2347037307898?text=Hello%20GETLAYED/DEV,%20I%20am%20interested%20in%20buying%20an%20EFootball%20account." target="_blank">
        DM ON WHATSAPP
      </a>
    </div>
  </div>

  <footer>
    <img src="images/footer.jpeg" alt="Footer" style="max-width: 150px; opacity: 0.8;"><br>
    
    
    
    
    © 2026 EFootball Store | Built by <strong>GETLAYED/DEV</strong>
  </footer>

</body>
</html>
